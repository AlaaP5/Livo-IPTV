services:
  postgresql:
    container_name: pg-iptv
    image: postgres:18
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${KC_POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "4000:5432"
    networks:
      - ishow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin_iptv
    image: dpage/pgadmin4:9.14.0
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "4001:80"
    networks:
      - ishow-net
    restart: unless-stopped

  mongodb:
    image: mongo:8.2.7
    container_name: mongo_iptv
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "4002:27017"
    volumes:
      - mongo:/data/db
    networks:
      - ishow-net
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo_express_iptv
    env_file:
      - .env
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
      ME_CONFIG_SITE_BASEURL: /mongo-express
    ports:
      - "4003:8081"
    depends_on:
      - mongodb
    networks:
      - ishow-net
    restart: unless-stopped

  keycloak:
    container_name: keycloak_iptv
    image: keycloak/keycloak:26.6
    env_file:
      - .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL_HOST: postgresql
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KC_POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /keycloak
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY_HEADERS: "xforwarded"
      KC_PROXY_ADDRESS_FORWARDING: "true"

    command:
      - start-dev
      - --import-realm
    ports:
      - "4004:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - ishow-net
    restart: unless-stopped

  redis:
    container_name: ishow_redis
    image: redis:7.4
    ports:
      - "4005:6379"
    volumes:
      - redis:/data
    networks:
      - ishow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  opensearch:
    container_name: opensearch_iptv
    image: opensearchproject/opensearch:3.6.0
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node

      # Memory (IMPORTANT)
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"

      # Security (built-in demo certs)
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}

    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

    volumes:
      - opensearch-data:/usr/share/opensearch/data

    ports:
      - "9200:9200"
      - "9600:9600"

    networks:
      - ishow-net

    restart: unless-stopped

  opensearch-dashboards:
    container_name: opensearch_dashboards_iptv
    image: opensearchproject/opensearch-dashboards:3.6.0
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}

      # Accept self-signed certs
      OPENSEARCH_SSL_VERIFICATIONMODE: none
      SERVER_BASEPATH: /opensearch-dashboards
      SERVER_REWRITEBASEPATH: "true"
      SERVER_PUBLICBASEURL: https://ishow-test.doremi.click/opensearch-dashboards

    ports:
      - "5601:5601"

    depends_on:
      - opensearch

    networks:
      - ishow-net

    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: kafka_iptv
    env_file:
      - .env
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

    volumes:
      - kraft-data:/var/lib/kafka/data
    networks:
      - ishow-net
    restart: unless-stopped

  ishow-api:
    container_name: ishow_api
    build:
      context: ./ishowApi
      dockerfile: dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev-docker
      SERVER_FORWARD_HEADERS_STRATEGY: native
    ports:
      - "9000:9000"
    volumes:
      - ${ISHOW_STORAGE}:/opt/ishow/storage/
      - ${ISHOW_DELETED}:/opt/ishow/deleted/
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - ishow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5


  stream-app:
    container_name: stream-app
    build:
      context: ./ishowStream
      dockerfile: dockerfile
    environment:
#      SERVER_FORWARD_HEADERS_STRATEGY: native
      SPRING_PROFILES_ACTIVE: dev-docker
    ports:
      - "9002:9002"
    volumes:
      - ${ISHOW_STORAGE}:/opt/ishow/storage/
    networks:
      - ishow-net
    restart: unless-stopped



  nginx:
    image: nginx:1.29
    container_name: nginx_iptv
    ports:
      - "9090:81"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    depends_on:
      - keycloak
      - mongo-express
      - pgadmin
      - opensearch-dashboards
      - ishow-api
      - stream-app
    networks:
      - ishow-net
    restart: unless-stopped

networks:
  ishow-net:
    driver: bridge

volumes:
  postgres:
  pgadmin:
  redis:
  mongo:
  opensearch-data:
  kraft-data: