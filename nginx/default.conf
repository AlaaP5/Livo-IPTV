server {
    listen 81;
    server_name ishow-test.doremi.click localhost;

    client_max_body_size 4G;

    # ---------------- STREAM SERVICE ----------------
    location /stream/ {
        proxy_pass http://stream-app:9002;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;


    }

    # ---------------- API ----------------
    location /api/ {
        proxy_pass http://ishow-api:9000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------- PGADMIN ----------------
    location /pgadmin/ {
        proxy_pass http://pgadmin:80/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------- MONGO EXPRESS ----------------
    location /mongo-express/ {
        proxy_pass http://mongo-express:8081;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------- OPENSEARCH ----------------
    location /opensearch-dashboards/ {
        proxy_pass http://opensearch-dashboards:5601;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # ---------------- KEYCLOAK ----------------
    location /keycloak/ {
        proxy_pass http://keycloak:8080/keycloak/;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
