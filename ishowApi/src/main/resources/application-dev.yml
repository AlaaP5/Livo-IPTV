# ===============================
# SERVER
# ===============================
server:
  port: 9001

# ===============================
# SPRING CORE
# ===============================
spring:
  application:
    name: ishow-api

  messages:
    encoding: UTF-8

  # ===============================
  # POSTGRESQL DATABASE
  # ===============================
  datasource:
    url: jdbc:postgresql://localhost:4000/iptv
    username: ishowadmin
    password: ishow1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ===============================
  # DATA CONFIG (Mongo + Redis)
  # ===============================
  data:
    redis:
      host: localhost
      port: 4005

  # ===============================
  # CACHE CONFIG
  # ===============================
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

  # ===============================
  # SECURITY / JWT
  # ===============================
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:4004/keycloak/realms/iptv-management
          jwk-set-uri: http://localhost:4004/keycloak/realms/iptv-management/protocol/openid-connect/certs

  mongodb:
    uri: mongodb://iptvmongo:iptv1234@localhost:4002/iptvmongo?authSource=admin

# ===============================
# JWT CUSTOM CONFIG
# ===============================
jwt:
  auth:
    converter:
      resource-id: account
      principal-attribute: preferred_username

# ===============================
# KEYCLOAK CONFIG
# ===============================
keycloak:
  server-url: http://localhost:4004/keycloak
  realm: iptv-management
  client-id: auth-service
  client-secret: 0d339f46-c0aa-4e9a-8f10-1185d36ac9cf
  admin:
    username: ${KEYCLOAK_ADMIN:ishowadmin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:ishow1234}

# ===============================
# OpenSearch CONFIG
# ===============================
opensearch:
  https: true
  host: localhost
  port: 9200
  username: admin
  password: T7k9!vQ2@pL8

# ===============================
# KAFKA CONFIG
# ===============================
Kafka:
  host: PLAINTEXT://localhost:9094
  groupId: iptv-group
  concurrency: 2

# ===============================
# JSON API
# ===============================
jsonapi:
  enabled: true

# ===============================
# LOGGING
# ===============================
logging:
  level:
    org.springframework.security: INFO
    org.keycloak: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE